<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - HHH Logistics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-body: #f1f5f9;
            --text-dark: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            /* Hiệu ứng nền chấm bi cho hiện đại */
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .login-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            border: 1px solid #e2e8f0;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-text {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-dark);
            margin: 0;
        }

        .logo-text span {
            color: var(--primary);
        }

        .subtitle {
            font-size: 14px;
            color: #64748b;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 6px;
            color: #475569;
            text-transform: uppercase;
        }

        .input-box {
            position: relative;
        }

        .input-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        input, select {
            width: 100%;
            padding: 12px 12px 12px 42px;
            border: 2px solid #f1f5f9;
            border-radius: 10px;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.3s;
            background: #f8fafc;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn-login {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        #error-msg {
            background: #fef2f2;
            color: #dc2626;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none; /* Ẩn mặc định */
            text-align: center;
            border: 1px solid #fee2e2;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="header">
        <div class="logo-text">HHH <span>Logistics</span></div>
        <p class="subtitle">Hệ thống quản lý nội bộ</p>
    </div>

    <!-- Thông báo lỗi -->
    <div id="error-msg">Mã NV hoặc Mật khẩu không đúng!</div>

    <form id="loginForm">
        <div class="form-group">
            <label>Mã nhân viên</label>
            <div class="input-box">
                <i class="fa-solid fa-id-badge"></i>
                <input type="text" id="userCode" placeholder="Nhập mã NV (ví dụ: NV01)" required>
            </div>
        </div>

        <div class="form-group">
            <label>Mật khẩu</label>
            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
        </div>

        <div class="form-group">
            <label>Bộ phận</label>
            <div class="input-box">
                <i class="fa-solid fa-briefcase"></i>
                <select id="role">
                    <option value="SALE">Kinh doanh (Sale)</option>
                    <option value="ACCOUNTANT">Kế toán (Accountant)</option>
                    <option value="MANAGER">Quản lý (Manager)</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn-login">ĐĂNG NHẬP</button>
    </form>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const userCode = document.getElementById('userCode').value;
        const pass = document.getElementById('password').value;
        const role = document.getElementById('role').value;
        const errorDiv = document.getElementById('error-msg');

        // KIỂM TRA ĐĂNG NHẬP ( có thể đổi mật khẩu ở đây)
        if (pass === '123') {
            const user = {
                code: userCode,
                name: "Nhân viên " + userCode,
                role: role
            };

            // Lưu thông tin vào máy để index.html dùng
            localStorage.setItem('currentUser', JSON.stringify(user));
            
            // Chuyển hướng sang trang chính
            window.location.href = 'index.html';
        } else {
            // Hiện lỗi nếu sai mật khẩu
            errorDiv.style.display = 'block';
            setTimeout(() => { errorDiv.style.display = 'none'; }, 3000);
        }
    });
</script>

</body>
</html>
