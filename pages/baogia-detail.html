<div class="page" id="page-baogia-detail">
    
    <!-- Header -->
    <div class="detail-header">
        <button class="btn btn-ghost" onclick="showPage('baogia-list')" style="margin-bottom:16px;">
            ← Quay lại danh sách báo giá
        </button>
        
        <div style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:20px">
            <div>
                <div class="detail-id">Mã báo giá</div>
                <div class="detail-title" id="detailMaBaoGia">#BG000000</div>
                <div style="display:flex; gap:12px; align-items:center; margin-top:8px">
                    <span class="badge" id="detailTrangThai">Chưa duyệt</span>
                    <span style="font-size:14px; color:var(--text-muted)" id="detailHanHieuLuc">
                        Hết hạn: --
                    </span>
                </div>
            </div>
            
            <div style="display:flex; gap:10px">
                <button class="btn btn-ghost" onclick="previewPDF()">📄 Xem PDF</button>
                <button class="btn btn-ghost" onclick="sendEmail()">📧 Gửi lại email</button>
            </div>
        </div>
    </div>

    <!-- Nội dung chính -->
    <div class="detail-grid">
        <div>
            <!-- Thông tin chung -->
            <div class="card" style="margin-bottom:24px">
                <div class="card-title">Thông tin chung</div>
                <div class="info-grid" id="infoChung">
                    <!-- JS sẽ điền dữ liệu vào đây -->
                </div>
            </div>

            <!-- Danh sách tuyến -->
            <div class="card">
                <div class="card-title">Chi tiết tuyến vận chuyển</div>
                <div id="tuyenListDetail">
                    <!-- JS sẽ tạo các tuyến động -->
                </div>
            </div>
        </div>

        <!-- Sidebar tổng kết -->
        <div class="summary-sidebar">
            <div class="summary-card">
                <div class="summary-header">Tổng kết báo giá</div>
                <div class="summary-body" id="summaryBody">
                    <!-- JS sẽ điền tổng kết -->
                </div>
            </div>
        </div>
    </div>
</div>
