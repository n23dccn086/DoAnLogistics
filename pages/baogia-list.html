<div class="page" id="page-baogia-list">
  <div class="filter-bar">
    <div
      style="
        display: flex;
        gap: 10px;
        align-items: center;
        flex: 1;
        flex-wrap: wrap;
      "
    >
      <!-- 👇👇👇 THÊM COMBOBOX CHỌN TIÊU CHÍ 👇👇👇 -->
      <select id="searchCriteria" class="filter-select" style="width: 150px">
        <option value="maBaoGia">Mã báo giá</option>
        <option value="khachHang">Khách hàng</option>
      </select>

      <!-- Thanh tìm kiếm -->
      <div class="search-wrapper" style="flex: 1; min-width: 300px">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          class="search-input"
          id="searchBaoGia"
          placeholder="Tìm theo mã báo giá hoặc tên khách hàng..."
          style="flex: 1"
        />
      </div>

      <!-- Nút Tìm kiếm -->
      <button class="btn btn-accent" onclick="searchBaoGiaList()">
        🔎 Tìm kiếm
      </button>

      <!-- Lọc trạng thái -->
      <select
        class="filter-select"
        id="filterStatus"
        onchange="loadDanhSachBaoGia()"
      >
        <option value="">Tất cả trạng thái</option>
        <option value="Chưa duyệt">Chưa duyệt</option>
        <option value="Đã gửi">Đã gửi</option>
        <option value="Chấp nhận">Chấp nhận</option>
        <option value="Từ chối">Từ chối</option>
      </select>

      <!-- Nút tạo mới -->
      <button class="btn btn-accent" onclick="showPage('baogia-create')">
        + Tạo báo giá mới
      </button>
    </div>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Mã báo giá</th>
          <th>Khách hàng</th>
          <th>Ngày tạo</th>
          <th>Hết hạn</th>
          <th>Số tuyến</th>
          <th>Tổng giá trị</th>
          <th>Trạng thái</th>
          <th>Thao tác</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="baogia-table-body">
        <!-- Dữ liệu sẽ được load động bằng JavaScript -->
      </tbody>
    </table>
  </div>
</div>
